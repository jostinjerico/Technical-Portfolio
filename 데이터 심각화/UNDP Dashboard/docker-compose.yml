version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ecoequity
      POSTGRES_USER: ecoadmin
      POSTGRES_PASSWORD: ecoequity25
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  db-init:
    image: postgres:16
    depends_on:
      - db
    volumes:
      - ./init-scripts:/init-scripts
    environment:
      PGPASSWORD: ecoequity25
    command: >
      bash -c "
        until pg_isready -h db -U ecoadmin -d ecoequity; do sleep 1; done &&
        psql -h db -U ecoadmin -d ecoequity -f /init-scripts/02-create-views.sql
      "
    restart: "no"